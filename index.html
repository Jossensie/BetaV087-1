<!DOCTYPE html>
<html>
<head>
  <title>Hand Tracking Robot Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Import Library -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
    #video-input { display: none; } /* Sembunyikan video asli */
  </style>
</head>
<body>

  <video id="video-input"></video>

  <script>
    const videoElement = document.getElementById('video-input');
    
    // --- 1. SETUP THREE.JS (DUNIA 3D) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Robot sederhana (diwakili kubus untuk tangan)
    const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
    const material = new THREE.MeshNormalMaterial();
    const robotHand = new THREE.Mesh(geometry, material);
    scene.add(robotHand);

    camera.position.z = 5;

    // --- 2. SETUP MEDIAPIPE (PELACAK TANGAN) ---
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0, // 0 untuk performa HP lebih cepat, 1 untuk lebih akurat
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // Ambil koordinat pergelangan tangan (Titik 0)
        // Kita balik koordinat X karena kamera depan biasanya mirror
        const x = (landmarks[0].x - 0.5) * -10; 
        const y = (landmarks[0].y - 0.5) * -10;
        const z = landmarks[0].z * -10;

        // Gerakkan robot sesuai tangan
        robotHand.position.set(x, y, 0);
        
        // Opsional: Rotasi robot berdasarkan kemiringan tangan
        robotHand.rotation.x = y * 0.5;
        robotHand.rotation.y = x * 0.5;
      }
    });

    // --- 3. AKTIFKAN KAMERA HP ---
    const cameraHelper = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({ image: videoElement });
      },
      width: 640,
      height: 480
    });
    cameraHelper.start();

    // Render loop
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // Handle resize layar HP
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
