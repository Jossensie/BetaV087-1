<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Trek Cinematic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <script id="fragmentShader" type="x-shader/x-fragment">
#version 300 es
precision highp float;
uniform float iTime;
uniform vec2 iResolution;
out vec4 fragColor;

// Fungsi matematika untuk membuat efek awan/nebula
mat2 mat2_rotate(float a) {
    float s = sin(a), c = cos(a);
    return mat2(c, s, -s, c);
}

float star(vec2 uv, float flare) {
    float d = length(uv);
    float m = 0.01 / d;
    if (flare > 0.0) {
        float rays = max(0., 1. - abs(uv.x * uv.y * 1000.));
        m += rays * flare;
    }
    return m;
}

float hash21(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}

void main() {
    vec2 uv = (gl_FragCoord.xy - .5 * iResolution.xy) / min(iResolution.y, iResolution.x);
    float t = iTime * 0.2;
    
    vec3 col = vec3(0);
    uv *= mat2_rotate(t * 0.1);

    // Layer Awan & Bintang (Persis Logika di Video)
    for(float i=0.; i<1.; i+=1./4.) {
        float depth = fract(i + t);
        float scale = mix(20., .5, depth);
        float fade = depth * smoothstep(1., .9, depth);
        vec2 gv = uv * scale + i * 453.2;
        vec2 id = floor(gv);
        gv = fract(gv) - .5;
        
        float n = hash21(id);
        float size = fract(n * 123.4);
        float starVal = star(gv, smoothstep(.9, 1., size) * .5);
        
        vec3 color = vec3(1.0, 0.7, 0.4); // Warna oranye Star Trek
        col += starVal * fade * color;
    }

    // Efek Warp Drive / Garis Cahaya
    vec2 gv2 = uv * 2.0;
    for(float i=0.; i<10.; i++) {
        float h = hash21(vec2(i, 123.));
        float speed = 0.5 + h;
        float fade = fract(t * speed + h);
        float x = (fade * 4.0) - 2.0;
        float y = (h * 2.0) - 1.0;
        float beam = 0.001 / length(vec2(uv.x - x, (uv.y - y) * 20.0));
        col += beam * vec3(1.0, 0.6, 0.3) * smoothstep(0., 0.1, fade) * smoothstep(1., 0.9, fade);
    }

    fragColor = vec4(col + vec3(0.05, 0.02, 0.0) * length(uv), 1.0);
}
    </script>
    <script src="script.js"></script>
</body>
</html>
